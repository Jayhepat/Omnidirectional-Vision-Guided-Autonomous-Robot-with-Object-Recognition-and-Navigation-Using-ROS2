omnisight:
  room_xml: "config/omnisight_room.xml"
  base:
    x: 0.5
    y: 0.5
    heading_deg: 0.0
    dock_tolerance_m: 0.20
  patrol_interval_minutes: 30
  patrol_speed_ms: 0.20
  return_speed_ms: 0.25
  camera_index: 0
  camera_width: 640
  camera_height: 480
  camera_fps: 30
  pan_servo_pin: 23
  tilt_servo_pin: 24
  pan_min_deg: -90
  pan_max_deg:  90
  tilt_min_deg: -30
  tilt_max_deg:  45
  pan_sweep_speed_dps: 30
  motor_i2c_address: 0x40
  motor_fl_channel: 0
  motor_fr_channel: 1
  motor_rl_channel: 2
  motor_rr_channel: 3
  motor_pwm_freq: 50
  motor_max_pwm: 4095
  ultrasonic_trigger_pin: 18
  ultrasonic_echo_pin: 24
  obstacle_stop_distance_m: 0.30
  obstacle_avoid_distance_m: 0.50
  buzzer_pin: 17
  buzzer_duration_sec: 3.0
  buzzer_frequency_hz: 2000
  known_faces_dir: "config/known_faces"
  face_distance_threshold: 0.55
  face_detection_confidence: 0.80
  baseline_dir: "config/baseline_images"
  scene_ssim_threshold: 0.85
  scene_pixel_diff_threshold_pct: 15.0
  baseline_refresh_cycles: 10
  monitoring_device_ip: "192.168.0.100"
  monitoring_device_port: 9999
  alert_socket_timeout_sec: 5.0
  alert_image_jpeg_quality: 85
  reconnect_attempts: 3
  log_dir: "/home/pi/omnisight_logs"
  log_level: "INFO"
  save_alert_images_locally: true
  simulation_mode: false
